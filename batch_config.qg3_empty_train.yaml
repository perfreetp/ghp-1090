# 场景 3: 空训练集（5 条交易全部在 2024-12-29，split.date.train_end=2024-11-30 -> train 集空）
# 预期: G2b BLOCK(train=0), status=blocked, exit_code=101
batch_task:
  task_name: "QG_scenario3_empty_train_block"
  inputs:
    transactions:
      - test_data/qg_testdata/txn_train_empty.csv
    chargebacks:
      - test_data/qg_testdata/chargebacks.csv
    blacklists:
      - test_data/qg_testdata/blacklists.csv
  output:
    base_dir: ./output_qg/03_empty_train_block
  import:
    field_mapping: {}
    null_threshold_pct: 30.0
  split:
    method: date
    train_end: "2024-11-30"
    valid_end: "2024-12-15"
    time_col: "txn_time"
    stratified: false
    prevent_card_leak: false
  mask:
    fields: [cardholder_name, id_card, phone]
  export:
    formats: [csv, xlsx]
    include: ["train*"]
    prefix: ""
  quality_gates:
    block_on_empty_train: true               # ★ 开启空训练集阻断
    block_on_missing_required: false
    fraud_rate_warn_range: [0.0005, 0.15]
    max_fraud_rate_volatility_pct: 50.0
